<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Les Aventures del Porquet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rosa:     #FF6B9D;
    --rosa-clar:#FFB3CF;
    --groc:     #FFD93D;
    --blau:     #4ECDC4;
    --blau-fosc:#2B7A6F;
    --taronja:  #FF8C42;
  }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #FFF0F7 0%, #E8F8FF 50%, #FFF9E6 100%);
    overflow: hidden;
    position: relative;
  }

  .clouds { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.5; animation: floatCloud linear infinite; }
  .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
  .c1 { width:120px; height:40px; top:8%; left:-140px; animation-duration:22s; }
  .c1::before { width:60px; height:60px; top:-30px; left:15px; }
  .c1::after  { width:45px; height:45px; top:-22px; left:50px; }
  .c2 { width:90px; height:30px; top:20%; left:-120px; animation-duration:28s; animation-delay:5s; }
  .c2::before { width:44px; height:44px; top:-22px; left:10px; }
  .c2::after  { width:34px; height:34px; top:-17px; left:38px; }
  .c3 { width:150px; height:50px; top:65%; left:-180px; animation-duration:18s; animation-delay:2s; }
  .c3::before { width:70px; height:70px; top:-35px; left:20px; }
  .c3::after  { width:55px; height:55px; top:-28px; left:65px; }
  @keyframes floatCloud { from { transform: translateX(0); } to { transform: translateX(calc(100vw + 250px)); } }

  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star { position: absolute; font-size: 1.4rem; animation: twinkle 2.5s ease-in-out infinite; }
  @keyframes twinkle { 0%,100% { opacity:.7; transform: scale(1); } 50% { opacity:1; transform: scale(1.3); } }

  .screen {
    position: relative; z-index: 10;
    width: min(400px, 94vw);
    background: linear-gradient(160deg, #FFF0F7 0%, #E8F8FF 50%, #FFF9E6 100%);
    border-radius: 40px;
    border: 4px solid var(--rosa-clar);
    box-shadow: 0 20px 60px rgba(255,107,157,0.25);
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 22px 28px;
  }

  /* Ribbon centrat */
  .ribbon { display: flex; gap: 8px; margin-bottom: 10px; font-size: 1.5rem; justify-content: center; width: 100%; }
  .ribbon span { animation: bounce 1.2s ease-in-out infinite; }
  .ribbon span:nth-child(2) { animation-delay:.15s; }
  .ribbon span:nth-child(3) { animation-delay:.30s; }
  .ribbon span:nth-child(4) { animation-delay:.45s; }
  .ribbon span:nth-child(5) { animation-delay:.60s; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  .hero {
    width: 300px; height: 300px;
    display: flex; align-items: center; justify-content: center;
  }
  .hero img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 10px 20px rgba(255,107,157,0.35));
  }

  .title-wrap { text-align: center; margin: 6px 0 18px; }
  .title-sub {
    font-family: 'Baloo 2', cursive; font-size: 0.85rem; font-weight: 600;
    color: var(--blau-fosc); letter-spacing: 2px; text-transform: uppercase; opacity: 0.75;
  }
  .title-main {
    font-family: 'Baloo 2', cursive; font-size: 2rem; font-weight: 800; line-height: 1.1;
    background: linear-gradient(135deg, var(--rosa) 0%, var(--taronja) 50%, var(--groc) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 2px 4px rgba(255,107,157,0.3));
  }
  .title-del { font-size: 1.3rem; }

  /* Label centrat */
  .lang-label {
    font-size: 0.78rem; font-weight: 700; color: #bbb;
    letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 10px; text-align: center; width: 100%;
  }

  .lang-selector { display: flex; gap: 14px; margin-bottom: 22px; justify-content: center; }

  /* Botons sense fons */
  .lang-btn {
    display: flex; flex-direction: column; align-items: center;
    background: #FFF0F7; border: 3px solid #ddd; border-radius: 20px;
    padding: 10px 28px 10px; cursor: pointer; transition: all .2s ease;
    font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 1.1rem; color: #999;
    position: relative;
  }
  .lang-btn.active {
    border-color: var(--rosa); color: var(--rosa);
    transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255,107,157,0.2);
  }
  .lang-btn.active::after {
    content: '✓'; position: absolute; top: -10px; right: -8px;
    background: var(--rosa); color: white; border-radius: 50%;
    width: 22px; height: 22px; font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center; font-weight: 900;
  }

  .play-btn {
    width: 100%; max-width: 280px; padding: 16px 0;
    background: linear-gradient(135deg, var(--rosa) 0%, var(--taronja) 100%);
    border: none; border-radius: 50px;
    font-family: 'Baloo 2', cursive; font-size: 1.35rem; font-weight: 800; color: white;
    cursor: pointer; box-shadow: 0 8px 25px rgba(255,107,157,0.45), 0 3px 0 #c94070;
    letter-spacing: 1px; animation: pulseBtn 2.5s ease-in-out infinite;
  }
  @keyframes pulseBtn { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
  .play-btn:active { transform: scale(0.97) !important; }

  /* MENÚ */
  #pantalla-menu { display: none; width: 100%; flex-direction: column; align-items: center; }
  #pantalla-menu.visible { display: flex; }
  .menu-title { font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 800; color: var(--blau-fosc); margin-bottom: 14px; text-align: center; }
  .seccio { width: 100%; background: white; border-radius: 22px; border: 3px solid var(--rosa-clar); box-shadow: 0 4px 15px rgba(255,107,157,0.12); margin-bottom: 12px; overflow: hidden; }
  .seccio-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: linear-gradient(135deg, #FFF0F7, #E8F8FF); font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800; color: var(--rosa); }
  .seccio-header .ico { font-size: 1.6rem; }
  .seccio-items { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 12px; }
  .item-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: #FFF9F0; border: 2px solid #FFD93D; border-radius: 14px; padding: 8px 10px; cursor: pointer; transition: all .2s; font-family: 'Nunito', sans-serif; font-size: 0.7rem; font-weight: 700; color: #888; flex: 1; min-width: 65px; }
  .item-btn .ico2 { font-size: 1.4rem; }
  .item-btn:active { transform: scale(0.95); border-color: var(--rosa); color: var(--rosa); }
  .back-btn { margin-top: 6px; background: none; border: 2px solid #ddd; border-radius: 50px; padding: 8px 24px; font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700; color: #aaa; cursor: pointer; }
  .footer { margin-top: 12px; font-size: 0.68rem; color: #ccc; font-weight: 600; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="clouds">
  <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
</div>
<div class="stars">
  <div class="star" style="top:5%;left:6%;animation-delay:0s">⭐</div>
  <div class="star" style="top:10%;right:8%;animation-delay:.6s">✨</div>
  <div class="star" style="bottom:15%;left:5%;animation-delay:.9s">⭐</div>
  <div class="star" style="bottom:8%;right:7%;animation-delay:1.5s">✨</div>
</div>

<div class="screen">

  <!-- PORTADA -->
  <div id="pantalla-portada">
    <div class="ribbon">
      <span>🎨</span><span>🎮</span><span>🐷</span><span>📚</span><span>🌟</span>
    </div>

    <div class="hero">
      <img src="https://raw.githubusercontent.com/tozier4364/les-aventures-del-porquet/main/assets/images/porquet_dab.png" alt="Porquet">
    </div>

    <div class="title-wrap">
      <div class="title-sub" id="title-sub">🌟 Benvingut a 🌟</div>
      <div class="title-main">Les Aventures<br><span class="title-del">del</span> Porquet</div>
    </div>

    <div class="lang-label">Tria l'idioma · Elige idioma</div>
    <div class="lang-selector">
      <button class="lang-btn active" onclick="setLang(this,'ca')">Català</button>
      <button class="lang-btn" onclick="setLang(this,'es')">Castellano</button>
    </div>

    <button class="play-btn" id="playBtn" onclick="entrarMenu()">🐷 Juguem! ✨</button>
  </div>

  <!-- MENÚ PRINCIPAL -->
  <div id="pantalla-menu">
    <div class="menu-title" id="menu-title">🐷 Què vols fer avui?</div>
    <div class="seccio">
      <div class="seccio-header"><span class="ico">🎓</span><span id="s-aprendre">Aprèn amb el Porquet</span></div>
      <div class="seccio-items">
        <div class="item-btn"><span class="ico2">🔢</span><span id="i-numeros">Números</span></div>
        <div class="item-btn"><span class="ico2">🗺️</span><span id="i-geo">Geografia</span></div>
        <div class="item-btn"><span class="ico2">🎨</span><span id="i-colors">Colors</span></div>
        <div class="item-btn"><span class="ico2">🐘</span><span id="i-animals">Animals</span></div>
      </div>
    </div>
    <div class="seccio">
      <div class="seccio-header"><span class="ico">🎮</span><span id="s-jugar">Juga amb el Porquet</span></div>
      <div class="seccio-items">
        <div class="item-btn"><span class="ico2">🧩</span><span id="i-puzzle">Trencaclosques</span></div>
        <div class="item-btn"><span class="ico2">🔤</span><span id="i-sopa">Sopa de lletres</span></div>
        <div class="item-btn"><span class="ico2">🃏</span><span id="i-memoria">Memòria</span></div>
        <div class="item-btn"><span class="ico2">🖌️</span><span id="i-coloreja">Coloreja</span></div>
      </div>
    </div>
    <button class="back-btn" id="backBtn" onclick="tornarPortada()">← Tornar</button>
    <div class="footer" id="footer-txt">© Les Aventures del Porquet · Sense publicitat</div>
  </div>

</div>

<script>
  let langActual = 'ca';

  const texts = {
    ca: {
      titleSub: '🌟 Benvingut a 🌟',
      play: '🐷 Juguem! ✨',
      menuTitle: '🐷 Què vols fer avui?',
      sAprendre: 'Aprèn amb el Porquet', sJugar: 'Juga amb el Porquet',
      numeros: 'Números', geo: 'Geografia', colors: 'Colors', animals: 'Animals',
      puzzle: 'Trencaclosques', sopa: 'Sopa de lletres', memoria: 'Memòria', coloreja: 'Coloreja',
      back: '← Tornar', footer: '© Les Aventures del Porquet · Sense publicitat'
    },
    es: {
      titleSub: '🌟 Bienvenido a 🌟',
      play: '🐷 ¡Jugamos! ✨',
      menuTitle: '🐷 ¿Qué quieres hacer hoy?',
      sAprendre: 'Aprende con el Porquet', sJugar: 'Juega con el Porquet',
      numeros: 'Números', geo: 'Geografía', colors: 'Colores', animals: 'Animales',
      puzzle: 'Puzzles', sopa: 'Sopa de letras', memoria: 'Memoria', coloreja: 'Colorear',
      back: '← Volver', footer: '© Les Aventures del Porquet · Sin publicidad'
    }
  };

  function setLang(btn, lang) {
    langActual = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const t = texts[lang];
    document.getElementById('title-sub').textContent = t.titleSub;
    document.getElementById('playBtn').textContent = t.play;
  }

  function entrarMenu() {
    const t = texts[langActual];
    document.getElementById('menu-title').textContent = t.menuTitle;
    document.getElementById('s-aprendre').textContent = t.sAprendre;
    document.getElementById('s-jugar').textContent = t.sJugar;
    document.getElementById('i-numeros').textContent = t.numeros;
    document.getElementById('i-geo').textContent = t.geo;
    document.getElementById('i-colors').textContent = t.colors;
    document.getElementById('i-animals').textContent = t.animals;
    document.getElementById('i-puzzle').textContent = t.puzzle;
    document.getElementById('i-sopa').textContent = t.sopa;
    document.getElementById('i-memoria').textContent = t.memoria;
    document.getElementById('i-coloreja').textContent = t.coloreja;
    document.getElementById('backBtn').textContent = t.back;
    document.getElementById('footer-txt').textContent = t.footer;
    document.getElementById('pantalla-portada').style.display = 'none';
    document.getElementById('pantalla-menu').classList.add('visible');
  }

  function tornarPortada() {
    document.getElementById('pantalla-menu').classList.remove('visible');
    document.getElementById('pantalla-portada').style.display = 'block';
  }
</script>

</body>
</html>
